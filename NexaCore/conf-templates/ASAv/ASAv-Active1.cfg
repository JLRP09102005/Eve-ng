#########################################
#Configure Cores Uplinks
#########################################
interface e0/4
 ip address 192.168.75.25 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

