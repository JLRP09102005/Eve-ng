#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.11 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.11
 passive-interface default
 auto-cost reference-bandwidth 10000
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 no passive-interface e0/4
 no passive-interface e0/5
 no passive-interface e0/6
 exit

#########################################
#Configure Horizontal Links
#########################################
interface g0/3
 ip address 192.168.68.0 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 65535
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 shutdown
 exit

#########################################
#Configure Cores Uplinks
#########################################
interface g0/4
 ip address 192.168.66.1 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g0/5
 ip address 192.168.66.7 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g0/6
 ip address 192.168.66.13 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 9999
 no ip proxy-arp
 no ip redirects
 no ip unreachables

#########################################
#Configure CSR Uplinks
#########################################
interface g0/0
 ip address 192.168.65.0 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g0/1
 ip address 192.168.65.2 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g0/2
 ip address 192.168.65.4 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 9999
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

#########################################
#Enable Horizontal link if uplink fails
#########################################
## IP SLA when uplinks down
ip sla 1
 icmp-echo 192.168.65.1 source-interface g0/0
 frequency 30
 exit
ip sla schedule 1 life forever start-time now

ip sla 2
 icmp-echo 192.168.65.3 source-interface g0/1
 frequency 30
 exit
ip sla schedule 2 life forever start-time now

ip sla 3
 icmp-echo 192.168.65.5 source-interface g0/2
 frequency 30
 exit
ip sla schedule 3 life forever start-time now

track 1 ip sla 1 reachability
 exit
track 2 ip sla 2 reachability
 exit
track 3 ip sla 3 reachability
 exit

track 10 list boolean and
 object 1 not
 object 2 not
 object 3 not
 exit

## EEM, enable and disable horizontal links depending of the uplinks state
event manager applet HORIZONTAL_ENABLE
 event track 10 state up
 action 1.0 syslog priority warnings msg "ALERT: All uplinks down - activating horizontal link"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface e0/3"
 action 4.1 cli command "no shutdown"
 action 5.0 cli command "end"
 exit

event manager applet HORIZONTAL_DISABLE
 event track 10 state down
 action 1.0 syslog priority informational msg "INFO: Uplinks restored - disabling horizontal link"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface e0/3"
 action 4.1 cli command "shutdown"
 action 5.0 cli command "end"
 exit

#########################################
#Enable Shadow link If CSR Active links fails
#########################################
## Track from IP SLA
track 11 list boolean or
 object 1 not
 object 2 not
 exit

## EEM, modify link cost depending of the active links state
event manager applet DECREASE_CSR_SHADOW_COST
 event track 11 state up
 action 1.0 syslog priority warnings msg "EEM ALERT: CSR Shadow link cost decreased; backup link activated in ECMP"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface e0/2"
 action 4.1 cli command "ip ospf cost 10"
 action 5.0 cli command "end"
 exit

event manager applet INCREASE_CSR_SHADOW_COST
 action 1.0 syslog priority warnings msg "EEM ALERT: CSR Shadow link cost increased; backup link returned to standby mode"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface e0/2"
 action 4.1 cli command "ip ospf cost 9999"
 action 5.0 cli command "end"
 exit

#########################################
#Enable Shadow link If Core Active links fails
#########################################
## IP SLA when downlinks down
ip sla 4
 icmp-echo 192.168.66.0 source-interface g0/4
 frequency 30
 exit
ip sla schedule life forever start-time now

ip sla 5
 icmp-echo 192.168.66.6 source-interface g0/5
 frequency 30
 exit
ip sla schedule 5 life forever start-time now

track 4 ip sla 4 reachability
 exit
track 5 ip sla 5 reachability
 exit

track 12 list boolean or
 object 4 not
 object 5 not
 exit

## EEM, modify link cost depending of the active links state
event manager applet DECREASE_CORE_SHADOW_COST
 event track 12 state up
 action 1.0 syslog priority warnings msg "EEM ALERT: CORE Shadow link cost decreased; backup link activated in ECMP"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g0/6"
 action 4.1 cli command "ip ospf cost 10"
 action 5.0 cli command "end"
 exit

event manager applet INCREASE_CORE_SHADOW_COST
 event track 12 state down
 action 1.0 syslog priority warnings msg "EEM ALERT: CORE Shadow link cost increased; backup link returned to standby mode"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g0/6"
 action 4.1 cli command "ip ospf cost 9999"
 action 5.0 cli command "end"
 exit