#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.11 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.11
 passive-interface default
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 no passive-interface e0/4
 no passive-interface e0/5
 no passive-interface e0/6
 exit

#########################################
#Configure Cores Uplinks
#########################################
interface e0/4
 ip address 192.168.66.1 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/5
 ip address 192.168.66.7 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/6
 ip address 192.168.66.13 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables