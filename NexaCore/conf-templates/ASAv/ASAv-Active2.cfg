#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.12 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.12
 passive-interface default
 exit

#########################################
#Configure Cores Uplinks
#########################################
interface e0/5
 ip address 192.168.66.3 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/6
 ip address 192.168.66.9 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/7
 ip address 192.168.66.15 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit