#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.13 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.13
 passive-interface default
 exit

#########################################
#Configure Cores Uplinks
#########################################
interface e0/4
 ip address 192.168.75.29 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/5
 ip address 192.168.75.35 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/6
 ip address 192.168.75.41 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit