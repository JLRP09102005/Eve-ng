# Escenario 2 — Caen Core1 y Core2:
# Core1 y Core2 caen
# ↓
# Core-Shadow (Transparent) no tiene la BD de VLANs
# ↓ PROBLEMA
# SW-DIS-* (Client) mantienen VLANs en RAM mientras estén encendidos
# ↓
# Si los DIS no se han reiniciado, la red sigue funcionando
# ↓
# Cuando Core1 o Core2 vuelven, todo se sincroniza
# Este es el único punto débil — si Core-Shadow entra en producción como sustituto no puede actuar como Primary porque está en Transparent.
# La solución:
# Cuando Core-Shadow entra en producción por fallo masivo, el administrador ejecuta manualmente:
# Core-Shadow(config)# vtp mode server
# Core-Shadow# vtp primary vlan