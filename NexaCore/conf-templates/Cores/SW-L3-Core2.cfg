#########################################
#Configure OSPF
#########################################
#Loopback Interface
interface Loopback0
 ip address 192.168.74.6 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.6
 passive-interface default
 auto-cost reference-bandwidth 10000
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 no passive-interface e1/0
 no passive-interface e1/1
 no passive-interface e1/2
 no passive-interface e1/3
 no passive-interface e2/0
 exit

#########################################
#Configure Horizontal Links
#########################################
interface e0/3
 no switchport
 ip address 192.168.69.1 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 65535
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 shutdown
 exit

interface e1/0
 no switchport
 ip address 192.168.69.2 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 65535
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 shutdown
 exit

