#########################################
#Automation Actions (replaces EEM)
#########################################
config system automation-action
    # Decrease CSR Shadow cost to 10 (activate backup in ECMP)
    edit "DECREASE_CSR_SHADOW_COST"
        set action-type cli-script
        set script "config router ospf\n config ospf-interface\n edit port3\n set cost 10\n end\n end"
    next
    
    # Increase CSR Shadow cost to 9999 (return to standby)
    edit "INCREASE_CSR_SHADOW_COST"
        set action-type cli-script
        set script "config router ospf\n config ospf-interface\n edit port3\n set cost 9999\n end\n end"
    next
    
    # Decrease Core Shadow cost to 10 (activate backup in ECMP)
    edit "DECREASE_CORE_SHADOW_COST"
        set action-type cli-script
        set script "config router ospf\n config ospf-interface\n edit port7\n set cost 10\n end\n end"
    next
    
    # Increase Core Shadow cost to 9999 (return to standby)
    edit "INCREASE_CORE_SHADOW_COST"
        set action-type cli-script
        set script "config router ospf\n config ospf-interface\n edit port7\n set cost 9999\n end\n end"
    next
    
    # Verifica si los 3 CSR monitores están DOWN y activa horizontal
    edit "CHECK_AND_ENABLE_HORIZONTAL"
        set action-type cli-script
        set script "dead1=`diagnose sys link-monitor status | grep 'CSR_ACTIVE_1' | grep -c dead`; dead2=`diagnose sys link-monitor status | grep 'CSR_ACTIVE_2' | grep -c dead`; dead3=`diagnose sys link-monitor status | grep 'CSR_SHADOW' | grep -c dead`; if [ $dead1 -eq 1 ] && [ $dead2 -eq 1 ] && [ $dead3 -eq 1 ]; then config system interface; edit port4; set status up; end; fi"
    next
    
    # Verifica si algún CSR monitor está UP y desactiva horizontal
    edit "CHECK_AND_DISABLE_HORIZONTAL"
        set action-type cli-script
        set script "alive1=`diagnose sys link-monitor status | grep 'CSR_ACTIVE_1' | grep -c alive`; alive2=`diagnose sys link-monitor status | grep 'CSR_ACTIVE_2' | grep -c alive`; alive3=`diagnose sys link-monitor status | grep 'CSR_SHADOW' | grep -c alive`; if [ $alive1 -eq 1 ] || [ $alive2 -eq 1 ] || [ $alive3 -eq 1 ]; then config system interface; edit port4; set status down; end; fi"
    next
end

#########################################
#Automation Stitches (ties triggers to actions)
#########################################
config system automation-stitch
    # CSR Shadow control - Activar cuando CSR1 DOWN
    edit "CSR_SHADOW_ACTIVATE_1"
        set trigger "CSR_ACTIVE_1_DOWN"
        set action "DECREASE_CSR_SHADOW_COST"
    next
    
    # CSR Shadow control - Activar cuando CSR2 DOWN
    edit "CSR_SHADOW_ACTIVATE_2"
        set trigger "CSR_ACTIVE_2_DOWN"
        set action "DECREASE_CSR_SHADOW_COST"
    next
    
    # CSR Shadow control - Recuperar cuando CSR1 UP
    edit "CSR_SHADOW_RECOVER_1"
        set trigger "CSR_ACTIVE_1_UP"
        set action "INCREASE_CSR_SHADOW_COST"
    next
    
    # CSR Shadow control - Recuperar cuando CSR2 UP
    edit "CSR_SHADOW_RECOVER_2"
        set trigger "CSR_ACTIVE_2_UP"
        set action "INCREASE_CSR_SHADOW_COST"
    next
    
    # Core Shadow control - Activar cuando Core1 DOWN
    edit "CORE_SHADOW_ACTIVATE_1"
        set trigger "CORE_ACTIVE_1_DOWN"
        set action "DECREASE_CORE_SHADOW_COST"
    next
    
    # Core Shadow control - Activar cuando Core2 DOWN
    edit "CORE_SHADOW_ACTIVATE_2"
        set trigger "CORE_ACTIVE_2_DOWN"
        set action "DECREASE_CORE_SHADOW_COST"
    next
    
    # Core Shadow control - Recuperar cuando Core1 UP
    edit "CORE_SHADOW_RECOVER_1"
        set trigger "CORE_ACTIVE_1_UP"
        set action "INCREASE_CORE_SHADOW_COST"
    next
    
    # Core Shadow control - Recuperar cuando Core2 UP
    edit "CORE_SHADOW_RECOVER_2"
        set trigger "CORE_ACTIVE_2_UP"
        set action "INCREASE_CORE_SHADOW_COST"
    next
    
    # Horizontal link - Verificar activación cuando cualquier CSR DOWN
    edit "HORIZONTAL_CHECK_ENABLE_1"
        set trigger "CSR_ACTIVE_1_DOWN"
        set action "CHECK_AND_ENABLE_HORIZONTAL"
    next
    
    edit "HORIZONTAL_CHECK_ENABLE_2"
        set trigger "CSR_ACTIVE_2_DOWN"
        set action "CHECK_AND_ENABLE_HORIZONTAL"
    next
    
    edit "HORIZONTAL_CHECK_ENABLE_3"
        set trigger "CSR_SHADOW_DOWN"
        set action "CHECK_AND_ENABLE_HORIZONTAL"
    next
    
    # Horizontal link - Verificar desactivación cuando cualquier CSR UP
    edit "HORIZONTAL_CHECK_DISABLE_1"
        set trigger "CSR_ACTIVE_1_UP"
        set action "CHECK_AND_DISABLE_HORIZONTAL"
    next
    
    edit "HORIZONTAL_CHECK_DISABLE_2"
        set trigger "CSR_ACTIVE_2_UP"
        set action "CHECK_AND_DISABLE_HORIZONTAL"
    next
    
    edit "HORIZONTAL_CHECK_DISABLE_3"
        set trigger "CSR_SHADOW_UP"
        set action "CHECK_AND_DISABLE_HORIZONTAL"
    next
end