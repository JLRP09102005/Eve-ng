#########################################
#Configure OSPF with ECMP
#########################################

# Enable ECMP in FortiGate
config system settings
    set v4-ecmp-mode source-ip-based
end

# Configure OSPF with all interfaces
config router ospf
    set router-id 192.168.74.11
    set auto-cost-ref-bandwidth 10000
    set restart-mode graceful-restart
    
    config area
        edit 0.0.0.0
        next
    end
    
    config ospf-interface
        # CSR Active 1 (ex g0/0)
        edit "port1"
            set interface "port1"
            set cost 10
            set network-type point-to-point
        next
        
        # CSR Active 2 (ex g0/1)
        edit "port2"
            set interface "port2"
            set cost 10
            set network-type point-to-point
        next
        
        # CSR Shadow (ex g0/2)
        edit "port3"
            set interface "port3"
            set cost 9999
            set network-type point-to-point
        next
        
        # Horizontal Link (ex g0/3)
        edit "port4"
            set interface "port4"
            set cost 65535
            set network-type point-to-point
        next
        
        # Core Active 1 (ex g0/4)
        edit "port5"
            set interface "port5"
            set cost 10
            set network-type point-to-point
        next
        
        # Core Active 2 (ex g0/5)
        edit "port6"
            set interface "port6"
            set cost 10
            set network-type point-to-point
        next
        
        # Core Shadow (ex g0/6)
        edit "port7"
            set interface "port7"
            set cost 9999
            set network-type point-to-point
        next
    end
end

#########################################
#Configure Loopback Interface
#########################################
config system interface
    edit "loopback0"
        set vdom "root"
        set ip 192.168.74.11 255.255.255.255
        set allowaccess ping
        set type loopback
        set role lan
    next
end

#########################################
#Configure Physical Interfaces
#########################################
config system interface
    # CSR Active 1 (ex g0/0)
    edit "port1"
        set vdom "root"
        set mode static
        set ip 192.168.65.1 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
    
    # CSR Active 2 (ex g0/1)
    edit "port2"
        set vdom "root"
        set mode static
        set ip 192.168.65.3 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
    
    # CSR Shadow (ex g0/2)
    edit "port3"
        set vdom "root"
        set mode static
        set ip 192.168.65.5 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
    
    # Horizontal Link (ex g0/3)
    edit "port4"
        set vdom "root"
        set mode static
        set ip 192.168.68.1 255.255.255.254
        set allowaccess ping
        set type physical
        set role lan
        set status down
    next
    
    # Core Active 1 (ex g0/4)
    edit "port5"
        set vdom "root"
        set mode static
        set ip 192.168.66.1 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
    
    # Core Active 2 (ex g0/5)
    edit "port6"
        set vdom "root"
        set mode static
        set ip 192.168.66.7 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
    
    # Core Shadow (ex g0/6)
    edit "port7"
        set vdom "root"
        set mode static
        set ip 192.168.66.13 255.255.255.254
        set allowaccess ping
        set type physical
        set role wan
        set status up
    next
end

#########################################
#Configure Link Monitor (replaces IP SLA)
#########################################
config system link-monitor
    # CSR Active 1
    edit "CSR_ACTIVE_1"
        set srcintf "port1"
        set server "192.168.65.2"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
    
    # CSR Active 2
    edit "CSR_ACTIVE_2"
        set srcintf "port2"
        set server "192.168.65.4"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
    
    # CSR Shadow
    edit "CSR_SHADOW"
        set srcintf "port3"
        set server "192.168.65.6"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
    
    # Core Active 1
    edit "CORE_ACTIVE_1"
        set srcintf "port5"
        set server "192.168.66.0"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
    
    # Core Active 2
    edit "CORE_ACTIVE_2"
        set srcintf "port6"
        set server "192.168.66.6"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
    
    # Core Shadow
    edit "CORE_SHADOW"
        set srcintf "port7"
        set server "192.168.66.14"
        set interval 30
        set failtime 3
        set recoverytime 3
    next
end

