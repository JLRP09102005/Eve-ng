#########################################
#Configure Uplinks
#########################################
interface e0/0
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,70,90,100,110,120,170,180,190,200
 switchport native vlan 900
 no spanning-tree portfast
 no spanning-tree bpduguard enable
 no shutdown
#########################################
#Enable Horizontal link if uplink fails
#########################################
interface e0/1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,70,90,100,110,120,170,180,190,200,900
 switchport trunk native vlan 900
#  switchport nonegotiate
 no spanning-tree portfast
 no spanning-tree bpduguard enable
 spanning-tree cost 9999999