#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.13 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.13
 passive-interface default
 auto-cost reference-bandwidth 10000
 no passive-interface g1
 no passive-interface g2
 no passive-interface g3
 no passive-interface g4
 no passive-interface g5
 no passive-interface g6
 no passive-interface g7
 exit

#########################################
#Configure Horizontal Links
#########################################
interface g4
 ip address 192.168.67.3 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 65535
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 shutdown
 exit

#########################################
#Configure Core Uplinks
#########################################
interface g5
 ip address 192.168.66.5 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown 
 exit

interface g6
 ip address 192.168.66.11 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g7
 ip address 192.168.66.17 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 9999
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

#########################################
#Configure ASAv Uplinks
#########################################
##Interfaces
interface g1
 ip address 192.168.65.12 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown 
 exit

interface g2
 ip address 192.168.65.14 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 10
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g3
 ip address 192.168.65.16 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 ip ospf cost 9999
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

#########################################
#Enable Horizontal link if uplink fails
#########################################
## IP SLA when uplinks down
ip sla 1
 icmp-echo 192.168.65.13 source-interface g1
 frequency 30
 exit
ip sla schedule 1 life forever start-time now

ip sla 2
 icmp-echo 192.168.65.15 source-interface g2
 frequency 30
 exit
ip sla schedule 2 life forever start-time now

ip sla 3
 icmp-echo 192.168.65.17 source-interface g3
 frequency 30
 exit
ip sla schedule 3 life forever start-time now


track 1 ip sla 1 reachability
 exit
track 2 ip sla 2 reachability
 exit
track 3 ip sla 3 reachability
 exit

track 10 list boolean and
 object 1 not
 object 2 not
 object 3 not
 exit

## EEM, enable and disable horizontal links depending of the uplinks state
event manager applet HORIZONTAL_ENABLE
 event track 10 state up
 action 1.0 syslog priority warnings msg "ALERT: All uplinks down - activating horizontal link"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g4"
 action 4.1 cli command "no shutdown"
 action 5.0 cli command "end"
 exit

event manager applet HORIZONTAL_DISABLE
 event track 10 state down
 action 1.0 syslog priority informational msg "INFO: Uplinks restored - disabling horizontal link"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g4"
 action 4.1 cli command "shutdown"
 action 5.0 cli command "end"
 exit

#########################################
#Enable Shadow link If ASAv Active links fails
#########################################
## Track from IP SLA
track 11 list boolean or
 object 1 not
 object 2 not
 exit

## EEM, modify link cost depending of the active links state
event manager applet DECREASE_ASAV_SHADOW_COST
 event track 11 state up
 action 1.0 syslog priority warnings msg "EEM ALERT: ASAv Shadow link cost decreased; backup link activated in ECMP"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g3"
 action 4.1 cli command "ip ospf cost 10"
 action 5.0 cli command "end"
 exit

event manager applet INCREASE_ASAV_SHADOW_COST
 action 1.0 syslog priority warnings msg "EEM ALERT: ASAv Shadow link cost increased; backup link returned to standby mode"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g3"
 action 4.1 cli command "ip ospf cost 9999"
 action 5.0 cli command "end"
 exit

#########################################
#Enable Shadow link If Core Active links fails
#########################################
## Track from IP SLA
ip sla 4
 icmp-echo 192.168.65.4 source-interface g5
 frequency 30
 exit
ip sla schedule 4 life forever start-time now

ip sla 5
 icmp-echo 192.168.65.10 source-interface g6
 frequency 30
 exit
ip sla schedule 5 life forever start-time now

track 4 ip sla 4 reachability
 exit
track 5 ip sla 5 reachability
 exit

track 12 list boolean or
 object 4 not
 object 5 not
 exit

## EEM, modify link cost depending of the active links state
event manager applet DECREASE_CORE_SHADOW_COST
 event track 12 state up
 action 1.0 syslog priority warnings msg "EEM ALERT: CORE Shadow link cost decreased; backup link activated in ECMP"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g7"
 action 4.1 cli command "ip ospf cost 10"
 action 5.0 cli command "end"
 exit

event manager applet INCREASE_CORE_SHADOW_COST
 event track 12 state down
 action 1.0 syslog priority warnings msg "EEM ALERT: CORE Shadow link cost increased; backup link returned to standby mode"
 action 2.0 cli command "enable"
 action 3.0 cli command "configure terminal"
 action 4.0 cli command "interface g7"
 action 4.1 cli command "ip ospf cost 9999"
 action 5.0 cli command "end"
 exit