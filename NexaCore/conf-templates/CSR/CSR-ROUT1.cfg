#########################################
#Configure OSPF
#########################################
interface Loopback0
 ip address 192.168.74.8 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.8
 passive-interface default
 default-information originate
 exit

#########################################
#Configure ASAv Uplinks
#########################################
interface g8
 ip address 192.168.65.1 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown exit

interface g9
 ip address 192.168.65.7 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface g10
 ip address 192.168.65.13 255.255.255.254
 ip ospf 1 area 0
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit