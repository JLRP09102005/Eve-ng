#########################################
#Configure OSPF
#########################################
#Loopback Interface
interface Loopback0
 ip address 192.168.74.2 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.2
 passive-interface default
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 no passive-interface e1/0
 default-information originate
 exit

#########################################
#Configure VLAN Interfaces
#########################################
interface vlan 10
 ip address 192.168.72.2 255.255.255.0
 ip ospf 1 area 2
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface vlan 90
 ip address 192.168.3.2 255.255.255.0
 ip ospf 1 area 2
 no ip proxy-arp
