#########################################
#Configure Access Uplinks
#########################################
interface range e1/1-2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,40,50,60,90,100,110,150,160
 switchport trun native vlan 900
 no spanning-tree portfast
 no spanning-tree bpduguard enable
 no shutdown
 exit

#########################################
#Configure OSPF
#########################################
#Loopback Interface
interface Loopback0
 ip address 192.168.74.3 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.3
 passive-interface default
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 no passive-interface e1/0
 exit

#########################################
#Configure VLAN Interfaces
#########################################
interface vlan 10
 ip address 192.168.72.3 255.255.255.0
 ip ospf 1 area 3
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface vlan 90
 ip address 192.168.3.3 255.255.255.0
 ip ospf 1 area 3
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
