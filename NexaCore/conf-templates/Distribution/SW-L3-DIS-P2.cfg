#########################################
#Configure Access Uplinks
#########################################
interface range e1/0-1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 10,30,80,90,100,110,130,140,900
 switchport trunk native vlan 900
 no spanning-tree portfast
 no spanning-tree bpduguard
 no shutdown
 exit

#########################################
#Configure OSPF
#########################################
#Loopback Interface
interface Loopback0
 ip address 192.168.74.4 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.4
 passive-interface default
 auto-cost reference-bandwidth 10000
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 exit

#########################################
#Configure VLAN Interfaces
#########################################
interface vlan 10
 ip address 192.168.72.4 255.255.255.0
 ip ospf 1 area 4
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface vlan 90
 ip address 192.168.3.4 255.255.255.0
 ip ospf 1 area 4
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

