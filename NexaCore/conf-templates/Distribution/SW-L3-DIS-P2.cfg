 ip ospf 1 area 4
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface vlan 110
 ip address 192.168.5.4 255.255.255.0
 ip ospf 1 area 4
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
