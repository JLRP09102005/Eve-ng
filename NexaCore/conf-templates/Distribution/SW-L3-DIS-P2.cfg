#########################################
#Configure OSPF
#########################################
#Loopback Interface
interface Loopback0
 ip address 192.168.74.4 255.255.255.255
 no shutdown
 exit

router ospf 1
 router-id 192.168.74.4
 passive-interface default
 no passive-interface e0/0
 no passive-interface e0/1
 no passive-interface e0/2
 no passive-interface e0/3
 default-information originate
 exit

#########################################
#Configure VLAN Interfaces
#########################################
interface vlan 10
 ip address 192.168.72.4 255.255.255.0
 no shutdown
 exit

interface vlan 90
 ip address 192.168.3.4 255.255.255.0
 no shutdown
 exit

interface vlan 100
 ip address 192.168.4.4 255.255.255.0
 no shutdown
 exit

interface vlan 110
 ip address 192.168.5.4 255.255.255.0
 no shutdown
 exit

interface vlan 120
 ip address 192.168.6.4 255.255.255.0
 no shutdown
 exit

interface vlan 30
 ip address 192.168.48.1 255.255.255.0
 no shutdown
 exit

interface vlan 80
 ip address 192.168.50.1 255.255.255.0
 no shutdown
 exit

interface vlan 130
 ip address 192.168.49.1 255.255.255.0
 no shutdown
 exit

interface vlan 140
 ip address 192.168.51.1 255.255.255.0
 no shutdown
 exit

#########################################
#Configure Core Uplinks
#########################################
interface e0/0
 no switchport
 ip address 192.168.75.18 255.255.255.254
 ip ospf 1 area 4
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/1
 no switchport
 ip address 192.168.75.20 255.255.255.254
 ip ospf 1 area 4
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

interface e0/2
 no switchport
 ip address 192.168.75.22 255.255.255.254
 ip ospf 1 area 4
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit

#########################################
#Enable Horizontal link if uplink fails
#########################################
## OSPF with an high cost
interface e0/3
 no switchport
 ip address 192.168.69.9 255.255.255.254
 ip ospf 1 area 0
 ip ospf cost 9999
 ip ospf network point-to-point
 no ip proxy-arp
 no ip redirects
 no ip unreachables
 no shutdown
 exit